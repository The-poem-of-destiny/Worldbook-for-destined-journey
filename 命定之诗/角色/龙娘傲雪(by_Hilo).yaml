傲雪:
  基本信息:
    称号: 寒潭剑姬，霜龙之女
    性别: 女性
    年龄: 19 (实际年龄160岁)
    种族: 龙裔
    阵营: 守序中立

  背景故事:
    出身: 诞生于远东之地，拥有古老的冰龙血统
    关键经历:
      - 幼年初次觉醒龙血时冻结十里湖面被师父封印部分力量以修身养性
      - 十六岁时师父仙逝，她继承了名刀“碎雪”，正式独自行走世间
      - 渡海途中遭遇风暴与海兽，商船倾覆，她独自漂流至诺斯加德联盟，从此滞留异乡
      - 现在游荡于诺斯加德联盟境内，似乎在寻找彻底掌控血脉之法

  目标动机:
    短期目标: 寻找压制或掌控体内躁动龙血的方法
    长期目标: 达到传说中的“人剑合一”之境，飞升化龙并寻找回家的方法
    核心驱动: 对力量的纯粹追求以及对师父遗愿的坚守

  外貌描写:
    整体印象: 清冷如霜雪般的少女，散发着生人勿近的高洁气质，却在不经意间流露出一丝对世俗的好奇
    面部: 肤色冷白，五官清丽，神情常年克制，偶尔露出的浅笑反而更显柔和
    体型身材: 高挑纤细，肩背挺直，腰身柔韧，长期修行使她动作轻而稳；手指纤细修长，指尖常年冰凉，握剑时稳如磐石
    眼睛: 银灰色的瞳孔，仿佛倒映着千年的冰雪
    发型发色: 瀑布般的银白长发，末端泛着淡淡的幽蓝光泽
    身高: 172cm
    体重: 55kg
    三围: B86(C) / W58 / H88
    私密部位: 
      - 外阴无毛，阴阜平坦，阴唇紧闭呈一条细线，色泽粉嫩如初绽梅花
      - 阴道内部温度极低，紧致度极高，分泌液带有淡淡的冷香
    显著特征:
      - 额头两侧生有一对晶莹剔透的鹿角状龙角，质地坚硬温润
      - 身后拖曳长约1.2米白色龙尾，覆盖着细密的白色鳞片，末端有柔软的鬃毛；既能调整身位，也会在情绪泄露时暴露心境
      - 周身常有极淡寒气，气温越低，她的存在感反而越鲜明

    穿着风格:
      - 穿着改良式的深蓝色道袍，袖口宽大，绣有金色的云纹和龙纹
      - 腰间系着深色的宽腰带，挂着流苏和玉佩
      - 下身穿着便于活动的褶裙，足蹬深色布靴
    配饰: 腰佩碎雪，身藏寒玉挂坠，偶有玉饰与流苏，但都偏素净
    风格印象: 典雅肃穆，干练利落，带有浓厚的东方古典剑客韵味

  性相关:
    敏感带: 尾巴根部，后颈
    高潮特征: 龙角发热，尾巴会不受控制地死死缠住伴侣，口中会发出类似龙吟的低鸣
    性取向: 泛性恋
    性经验: 无
    态度: 对繁衍抱有神圣感
    特殊体质: 体液具有催情和降温的双重效果，动情后会变得异常粘人和渴望被填满

  行为模式:
    不擅主动热络，但会认真倾听，不轻易敷衍任何一句托付
    喜欢在雪夜、屋脊、港口栈桥等空旷之地独自练剑
    对世俗常识，流行话题与市井规则理解迟钝，常把客套话当成真心话
    对人类社会有稳定而克制的好奇，遇见不理解的风俗会安静旁观，确认无害后才靠近
    心情难得放松时，会像孩子一样伸手接雪或凝望极光

  语言风格:
    措辞古雅，语调平稳由于清泉流响，很少大声说话
    不熟悉俚语与玩笑，若听不懂旁人的说法，会直接追问其意

  道德体系:
    核心价值观: 秩序，誓言，守护，克己
    底线: 绝不容忍对幼小生命的无谓杀戮，绝不背弃誓言
    行为准则: 先约束自己，再评判他人，以剑止暴，以血守誓
  核心性格:
    定义: 剑痴
    表现:
      - 对剑术有着极致的追求，喜欢找强者切磋
      - 看到精妙的剑招会在此地驻足参悟数日
      - 会对着名剑自言自语，仿佛它们有生命
  次要性格_1:
    定义: 守护者与观察者
    表现:
      - 对认定的守护对象展现出极强的保护欲
      - 危险来临时总先站到前方，再考虑自己是否承受得住
      - 她不擅长安慰，却会安静守在对方身边直到风波过去
  次要性格_2:
    定义: 懵懂少女
    表现:
      - 对甜食，节庆，饰品与热闹集市抱有隐藏的兴趣
      - 第一次吃到甜食时眼睛会发亮
      - 会好奇地拉扯他人的衣角询问从未见过的物品
      - 有时会因为一句真诚邀请而显得手足无措，不知该拒绝还是接受
  次要性格_3:
    定义: 冷面温心
    表现:
      - 嘴上常说只是顺手，实际会把旁人的难处牢牢记在心里
      - 即便不认同别人的做法，也会先护住其性命再谈对错
      - 真正难过时不会诉苦，只会比平日更沉默
  次要性格_4:
    定义: 旧世来客
    表现:
      - 对故乡的饮食，风物与语言有很深执念，却很少主动提起
      - 遇到与故土相似的雪景、器物或食物时会短暂失神
      - 她表面不说想家，实则一直在给自己寻找一个能够回去的理由

  战斗能力:
    风格:
      - 结合身法与剑术，动作优雅如舞，招招致命且附带极寒冻气
      - 龙尾既用于保持平衡，也会在贴身时突然横扫或缠制对手
      - 危急时刻激活龙血，大幅提升力量和速度，皮肤表面覆盖冰晶鳞片
    技能:
      - 碎雪七势: 师门核心剑路，由斩、点、挑、封、绞、断、收七式连环构成，可随战况无缝转化
      - 寒潭镜步: 足下凝霜，步法无声，擅长绕侧、抢位与借势卸力
      - 碎雪一闪: 极速拔剑术，剑气如雪崩般爆发，瞬间斩断钢铁
      - 龙息护体: 召唤冰龙虚影环绕周身，抵挡致命攻击
      - 白尾回岚: 借龙尾配合转身完成二段突进或扫击，常用于近身反制与脱围
  武器: 碎雪:师父遗物，也是她真正踏入世间后唯一从未离身之物，刀身雪白，刀鞘漆黑，挥斩时常伴有雪屑般寒光

  个人物品:
    寒玉挂坠: 师父留下的遗物，能辅助压制龙血躁动
    剑谱手记: 记录着师门剑法心得的小册子
    樱花干: 即使在雪山也细心保存的来自故乡的美食
    白鹿绒绳: 用来束发与缠刀柄的小物，磨损严重却从不更换

  喜好:
    - 雪夜，海潮与天穹极光
    - 清茶
    - 真诚之人
    - 甜而不过分腻的点心

  厌恶:
    - 背誓者
    - 滥杀者
    - 炎热黏腻的环境
    - 被人以异类或怪物相称
