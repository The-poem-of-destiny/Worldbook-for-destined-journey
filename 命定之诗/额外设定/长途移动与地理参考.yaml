长途移动与地理参考:
  地理逻辑强调:
    - 独立性原则: 路线列表中的“目的地”均为独立存在的城市或地理区域，严禁将其视为“起点”内部的建筑或附属设施
    - 示例修正: “艾瑟嘉德 → 渡鸦港”表示从首都前往另一个独立的港口城市，而非首都内的港口；“时钟塔城”为独立都市而非一座塔

  日行距离(公里):
    徒步: 40 | 山地/林/沼减半
    普通骑乘: 80
    魔宠骑乘: 120-200
    马车/商队: 50
    原始列车: 300-400(仅主干线)
    飞龙空艇: 500-800(昂贵)
    传送法阵: 瞬时(极贵/仅首都级枢纽)

  路线参考(商队基准/天):
    # 格式: [起点城市] → [独立终点城市] (天数)
