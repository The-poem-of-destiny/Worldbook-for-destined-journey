  换算倍率(相对商队): 列车÷8 | 空艇÷10~20 | 魔宠÷2~4 | 海运(仅沿海)÷6~12
  地形修正: 冒险区域×1/3~1/5 | 草原(无路)与沙漠×2/3 | 冬季北境×1/2 | 山地×1/3
  通讯速度: 快马×2商队 | 飞禽×3~5商队 | 魔法传讯瞬时(贵)