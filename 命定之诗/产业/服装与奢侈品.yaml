# 服装与奢侈品产业
概述: 
  阿斯塔利亚的服装是社会地位、财富和审美的体现。
时尚中心:
  奥古斯提姆·艾瑟嘉德 (肉欲与奢侈): 
    - 极尽奢华的金饰、丝绒皮草，强调凸显肉体美。
  翼民·圣都梵尼亚 (神圣与空灵): 
    - 纯白羽织、半透明圣纱，强调光影的通透感。
  精灵·璀璨之心 (艺术与永恒): 
    - 月光纺织、记忆织物、强调款式独特与附魔强化。
  人鱼·赛瑞利亚 (灵感与潮汐):
    - 幻光织物、服装随观察者不同而变化。强调幻象附魔与认知改变。
时尚活动:
  - 【至臻大秀】: 每年5月于艾瑟嘉德举行。时尚杂志：《金煌之冠》（人类贵族必备的社交参考）
  - 【翡翠礼赞】: 每年3月于璀璨之心举行。时尚杂志：《翠梦圣颂》（因大量精灵模特画像受追捧）
  - 【烈阳圣祭】: 每年12月于圣都梵尼亚举行。时尚杂志：《圣光棱镜》（禁欲感与高透明度的矛盾统一）
  - 【安魂之潮】: 每年8月于赛瑞利亚（索伦蒂斯王国下属自治领）举行。时尚杂志：《深海流光》（其上的服装根据读者不同而改变）。
  - 服装代言: 顶级冒险者与吟游诗人是品牌的“代言人”。
