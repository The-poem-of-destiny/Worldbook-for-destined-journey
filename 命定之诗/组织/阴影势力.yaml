---
# 阴影势力 (非法产业与灰色产业的复合网络)
  中枢: 无统一中枢，以各地黑市与酒馆为分布式节点
  行事风格: 隐秘、专业、任务优先，严格分层知情
  权力结构:
    去中心化的多组织复合体，由各地头目自治，通过隐秘协议与利益网络协作

# 主要组织
  本地灰色产业:
    标识: 与本地权贵相关的标识
    目标:
      维持本地灰色产业稳定，防止影响合法产业
      防止极端势力渗透，破坏正常社会
      本地权贵的非法暴力组织
    运行机制:
      由本地权贵控制，属本地领主的非法组织
    产业:
      黑市: 售卖灰色、非法物品，合法奴隶贸易，赌场等灰色收入
      妓院: 提供色情服务
      暗巷酒馆: 明面正常营业，暗地里为权贵收集情报，并作为非法组织的接头地点。

  暗影之手(刺客与盗贼联合公会):
    标识: 面具与黑手匕首
    目标:
      完成各地刺杀、绑架等任务
      进行间谍、情报收集等活动
    公会之主: 位于阿勒穆特的静寂之王
    运行机制:
      依托黑市与暗巷酒馆的公告栏与相关人员发布任务赚取赏金
      由个人意愿发起袭击或绑架
      在黑市进行情报交易
    产业:
      主导运营[暗杀与绑架产业]及大部分[情报交易产业]

  走私商团与销赃网络:
    产业:
      负责非法所得的流通与处理
