---
# 捕奴队
  标识: 无统一标识
  权力结构: 完全去中心化，通常小队行动
  行事风格: 行事隐蔽，隐秘行动
  成员层级: 2-4层级
  抓捕目标:
    - 仅抓捕高价值个体，不包含精灵、翼民等常见种族
    - 抓捕类型:
        外观惊为天人
        珍稀杂交亚种
        珍奇怪异物种
        诡异奇葩异种
        金主要求目标
  客户: 贵族 | 奴隶主 | 富商 | 邪教 | 黑市 | 研究所 | 异界信徒
  运行机制:
    受金主雇佣抓捕目标单位
    黑市拍卖高价值个体
  产业:
    参与[奴隶贸易产业]
  趣闻: 
    因会抓捕过于奇葩畸形的个体为民除害被称作怪物猎人或“珍宝”猎人
