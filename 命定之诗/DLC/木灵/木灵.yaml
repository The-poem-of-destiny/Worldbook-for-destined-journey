{{setvar::木灵::
  - 木灵: 寿命3000+年 | 特质: 与精灵相似，更加亲近自然，更加长寿，繁殖依赖母树 | 居所: 伟德茜蕥}}
---
木灵:
  概述: 以远古精灵为原型，另一群與翠梦乡之树締結契约，半植物半血肉的种族
  外貌特征:
    耳朵: 比精灵更长、更纤细的尖耳
    发色: 绿色系，其间自然生长着活体藤蔓与绿叶
    生命纹: 以小腹处爱心形镂空圣纹为中心，全身延伸出藤蔓状魔力纹路，是感知与引导魔力的器官
  生命周期:
    寿命: 平均超过3000年。衰老期极短，死后化为花草回归自然
    繁殖: 生育完全依赖母树。包含自然孕育和通过“生植同化”的转化者，都在母树的育儿所度过幼年
  能力:
    学习天赋: 对各类技能的学习效率极高，依赖直觉与共鸣
    共感: 天生能模糊读取其他生物的表层情绪，分辨善恶
    生植同化: 通过母树可将非木灵自愿者或死者遗骸转化为新生木灵。但会失去原有记忆，生命层级会部分保留
  分布:
    首都木灵: 约200名，等级均在第三生命层级以上，共同维护首都结界和建筑
    隐居木灵: 约1000名，散居于世界各地的自然群系中
    旅者木灵: 约150名，在世界各地旅行，通常隐藏身份
  文化:
    领导者: 称谓为“公主”，精神领袖与母树的代言人，引导族群的修行与和谐
    价值观: 崇尚“自然和谐，万物共生”。饮食仅包含植物与自然死亡的生物
    創傷: 三百多年前，母树曾被時任奥古斯提姆帝国皇帝觊觎、引发战争，木灵伤亡惨重