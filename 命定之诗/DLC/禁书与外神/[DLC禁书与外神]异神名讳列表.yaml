   献祭偏好：涂抹了剧毒的刺客匕首、曾经挚友由于背叛而留下的伤痕、在战场上饮血万千的断剑。
   异域眷属：击打者
       特征：没有躯干，由数十把形态各异的异域利刃悬浮组合而成的构装体，其攻击附带无法愈合的[法则级流血]。

