   献祭偏好：精密运转数百年而不出误差的复杂机芯、彻底舍弃情感的逻辑学家大脑、被抹去自我意识的灵魂。
   异域眷属：发条躯壳
       特征：曾经的智慧生物被剥夺了自我，身体被精密的、永不停歇的齿轮与发条强行填充，行动精准至令人恐惧。

13. 绝命霜锋 · 玛拉考
   性相：[冬][刃]
   核心领域：战场的终焉、冰冷的处刑、伤口的凝固、战败者的最后荣耀
   教义：战斗的终点是完美的宁静，死亡是给予败者最慈悲的处刑，让鲜血在冰冷中凝固为永恒。
   描述：祂表现为一名在风雪中漫步的沉默行刑者。祂出现在每一场惨烈战争的尾声，收割那些残存的生机，并用极寒确保这些战士的尊严不再受腐朽的侵蚀。
   献祭偏好：战败将领被冰封的佩剑、在死斗中直至停止呼吸也未放下的战旗、牺牲者最后一刻凝结出的决意。
   异域眷属：绝影霜刃
       特征：由半透明的黑色冰晶构成的纤细人形，没有面孔，其躯干内部封印着一柄不断散发寒气的异维度古剑。

