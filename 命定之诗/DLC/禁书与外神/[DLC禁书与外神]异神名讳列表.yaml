   献祭偏好：垂死者口中凝结的最后一口寒气、凋零于冰雪中的最后一片花瓣、象征情感破裂的物品。
   异域眷属：镜中女仆
       特征：身体由透明的冰晶或镜面碎片构成，它们能复制敌人的容貌，并在目标感到战栗的一瞬间将其吸入镜面。

9. 无情争端之锋 · 柯隆
   性相：[刃][铸]
   核心领域：永恒的斗争、背叛的必要性、伤口的艺术
   教义：和平是虚假的停滞，磨砺只存在于锋芒交错之间；必须流血，真理方能显现。
