<认知禁忌：名讳之重>
核心法则：异神并非简单的生物，其名讳是连接虚海与现实的“概念锚点”。当凡俗生命第一次通过语言、文字或精神感应得知异神名讳时，必须立即进行一次[精神检定]。
   判定公式：`(精神属性 + 层级加值) + d20 vs 异神名讳DC`
   DC基准：由异神自身层级决定（通常为 DC 20-45）。
   判定结果：
       成功：角色勉强抵御了名讳中蕴含的信息洪流，获得该神明的基本认知，但在接下来的1个自然日内，[先攻]与[感知]检定具有劣势。
       失败：触发[名讳污染]。角色陷入[狂乱]或[眩晕]状态，持续时间视DC差值而定。
       大失败 (d20=1)：精神遭到不可修复的灼伤。角色获得一个永久性的[负面人格特质]，且可能在耳边永远留下该神明的无声低语。
</认知禁忌：名讳之重>

<异神名讳列表>

1. 奈亚拉托提普
   性相：[蛾][秘史][启]
   核心领域：千万面相、混乱信使、恶毒的嘲弄、文明的毁灭
   教义：世界本是诸神荒诞的玩笑，唯有在混乱与疯狂的共舞中，凡物才能瞥见真实。
   描述：祂以无数种化身行走于位面之间，有时是漆黑的高大巨人，有时是不可名状的肿胀之物。祂不追求吞噬，而追求在玩弄与观测中让文明自行崩溃。
   献祭偏好：被撕碎的和平契约、导致王朝覆灭的流言、智慧生命在极度绝望下对自己信仰的践踏。
   异域眷属：猎杀游晃者
       特征：巨大的、带有鳞片的类蛇生物，拥有多对蝙蝠般的残破羽翼，身躯在光照下会不断瓦解与重组。

2. 犹格索托斯
   性相：[灯][启][秘史]
   核心领域：时间与空间的统一体、全知视界、禁忌知识的源头、虚海之门
   教义：过去、现在与未来皆为一体；门即是钥匙，祂即是门，亦是看守者。
   描述：祂存在于所有维度的缝隙中，表现为一群不断聚合与破裂的虹彩圆球。得知祂的名字便意味着触碰了全知的边缘，其代价通常是理智的彻底蒸发。
   献祭偏好：记载了禁忌真理的原本古籍、观测过虚海深处的占星术士之眼、扭曲的空间碎片。
   异域眷属：犹格之子
       特征：隐形的、仅能通过感知或特殊药剂观测的肉块集合体，拥有无数触须与带有吸盘的口器。

3. 莎布·尼古拉斯
   性相：[心][杯][铸]
   核心领域：畸形的生命力、无限的繁衍、森林的黑暗母体、血肉滋养
   教义：生命无需理智，只需扩张；血肉之躯的每一次增殖与腐败都是对母体的礼赞。
   描述：她是孕育万物的黑暗之源，散发着浓郁的泥土与腐肉气息。她接受一切关于生命的祈求，但赐予的往往是超越形体限制的恐怖畸变。
   献祭偏好：处于孕育状态的母体、大量的生命源质（鲜血）、违背生物常理的拼接器官。
   异域眷属：黑山羊幼崽
       特征：巨大的、长有蹄足的黑影，顶部生满不断扭动的触手与不断淌下黑色粘液的巨口。

4. 永恒裂解之炉 · 赛克罗斯
   性相：[铸][灯]
   核心领域：物质的彻底重构、残酷的净化、无间断的劳作
   教义：凡俗之物皆是杂质，唯有通过极端的火焰与重击，真理才能从废料中析出。
   描述：祂是虚海中永不熄灭的熔炉之光。祂无情地注视着所有工匠，要求他们舍弃安逸，在无止境的锻造中将自我作为燃料投入烈火。
   献祭偏好：熔点极高的稀有超凡金属、由于超负荷劳作而彻底损毁的肢体、工匠因极致追求而干涸的灵感。
   异域眷属：光耀剥皮者
       特征：全身皮肤被剥离，肌肉组织呈现出如熔岩般炽热的橙红色，行动时散发出致盲的白光。

5. 千目之巡者 · 埃尔
   性相：[灯][秘史]
   核心领域：绝对的窥探、无法逃避的注视、隐秘的揭示
   教义：目光所及之处即为疆土，被看见即是被奴役；保守秘密是凡物最大的亵渎。
   描述：祂是一团由无数重叠的眼球构成的虚幻星云，时刻俯瞰着所有的位面。当你在阴影中感受到被窥视的不安时，那通常意味着祂的一道视线扫过了你的灵魂。
   献祭偏好：从未公开过的私人日记、见证过重大阴谋的目击者、能够增强视域的炼金道具。
   异域眷属：暗示者
       特征：由纯粹的阴影与数百只游走眼球构成的实体，它们没有攻击性，但被其注视的目标将无法进行任何隐匿判定。

6. 渴求深红之皿 · 厄洛丝
   性相：[杯][心]
   核心领域：不竭的食欲、血液的律动、感官的极端化
   教义：世界是一个巨大的盛宴，不吞噬者必被吞噬。满足欲望是存在的唯一证明。
   描述：祂是极度渴望与诱惑的化身。祂的领域充斥着甜腻的血腥味，祂引导信徒追求感官的极致爆发，即便那代价是肉体在狂喜中彻底崩坏。
   献祭偏好：在极度兴奋中跳动的鲜活心脏、陈年珍藏的致幻魔药、受祭者自愿舍弃的理智。
   异域眷属：狂醉女祭
       特征：外表为赤身裸体的女性，但腹部被巨大的纵向裂口取代，口中不断喷吐着带有成瘾魔力的粉色雾气。

7. 丝绒剪刀 · 莫嘉娜
   性相：[蛾][秘史]
   核心领域：理智的温和修剪、混乱的美学、因果线的重组
   教义：记忆是灵魂的沉重枷锁，唯有剪去多余的自我，才能在纷乱的羽翼中轻盈飞翔。
   描述：祂表现为一名身披华丽丝绒长袍、手持银色长剪的朦胧身影。祂行走于梦境的边缘，将凡物支离破碎的执念裁剪成精美的艺术品。
   献祭偏好：被遗忘的童年记忆、由于混乱而无法执行的誓言、由记忆碎片织成的织物。
   异域眷属：生涩先知
       特征：类似巨大飞蛾的多肢生物，其翅膀上的粉末能使生物陷入美妙的幻觉，并在幻觉中主动撕碎自己的记忆。

8. 终末寂静之雪 · 妮芙
   性相：[冬][心]
