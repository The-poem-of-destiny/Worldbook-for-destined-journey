   献祭偏好：失去魔力反馈的枯萎魔晶、被彻底抽离灵魂的躯壳、能够吸收光线的绝对黑暗物质。
   异域眷属：星之精
       特征：不可见的、仅在进食（吸血）时才会勾勒出轮廓的异维度怪物，伴随着怪异的、令人作呕的吸吮声。

