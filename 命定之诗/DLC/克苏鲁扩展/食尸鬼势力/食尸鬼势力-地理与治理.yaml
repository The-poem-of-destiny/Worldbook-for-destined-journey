  地理与治理:
    行政管辖:
      地窟自治领:
        - 构成: 数百个由不同族群占据的洞穴聚落
        - 关系: 平时高度自治，战时响应会议征召
      中央特区:
        - 设施: 静默图书馆(存放记忆结晶)、网道核心(交通枢纽)
        - 功能: 仲裁纠纷、商议合作、集中存储禁忌知识
    政治生态与风貌:
      秘密货币:
        - 体系: 以“死者之语”(记忆片段)作为核心通货
        - 价值: 高价值秘密可兑换领土、军队或古老魔法
      幻梦特权:
        - 管制: 严格限制肉身进入幻梦境的名额
        - 收益: 向渴望入梦的强者收取高昂过路费
