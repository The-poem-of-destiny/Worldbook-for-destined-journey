---
势力-幽冥会议:
  概览:
    定位: 统辖地下世界各族群的松散联邦，现世地下网道与幻梦境入口的守门人
    标识: 蛇环绕破碎头骨
    首都: 大墓都(地壳深处)
    宗旨:
      - 通行垄断: 控制通往幻梦境的物理入口
      - 知识保全: 通过吞噬大脑收集死者秘密，防止文明断代
      - 生态维持: 维持地下秩序，保证种族存续
    行事风格: 隐忍、中立、机会主义、契约至上
    领导层: 长老议会(由食尸鬼长老组成)
    信仰: 祖灵崇拜、原初饥饿、旧日看守者
    主要据点: 大墓都、地下网道、灰土行会据点
    文化符号: 骸骨面具、无光视觉、秘密交易
