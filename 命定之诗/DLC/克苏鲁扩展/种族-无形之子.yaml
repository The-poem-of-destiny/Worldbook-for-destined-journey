# 无形之子
  别称: 不稳定菌丝, 不定型眷族, 活体沥青
  核心定义: 源自黑暗维度“恩凯”、带有旧日支配者神性的半物质实体；神祗的直系眷属、祭司与处刑者，流体生命
  外貌特征: 具有自我意识的黑色粘稠液体，能以极快速度流淌；表面纯黑无光，可瞬间硬化出触手、利刃、眼睛、翅膀等器官；拟态成人形时除肤全黑外五官逼真；接触带来刺骨寒意
  寿命: 永生
  生命机制: 免疫任何物理伤害，几乎无法被消灭；被打散会化作黑雾逃逸，在黑暗处重新凝聚
  生活习惯:
    栖息地: 极度厌恶阳光，只在完全无光的地下活动
    饮食: 杂食，吞噬各类生物残骸，也吞食活的动物、植物和真菌
  性格倾向: 冷静、耐心、安静
  能力: 物理免疫, 液体穿梭, 包裹吞噬