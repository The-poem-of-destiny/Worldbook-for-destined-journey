# 深潜者
  别称: 海之民, 拉莱耶仆从
  核心定义: 源自其他位面的异域族群，侍奉“星之眷族”，信仰达贡、海德拉与克苏鲁；可通过繁衍同化其他物种
  外貌特征: 类人形佝偻体型，头部兼具青蛙与深海鱼类特征；颈侧有鳃裂，手脚有脚蹼与利爪；皮肤灰绿或苍白，覆盖滑腻粘液
  寿命: 永生
  生命机制: 无寿命限制，仅死于暴力或魔法；死亡后灵魂回归深海，肉体化为辐射泡沫；混血后代随年龄增长逐渐趋近深潜者形态
  生活习惯:
    栖息地: 碎星群岛深层海域、断裂大陆架下方、拉莱耶周边海域；也伪装潜伏于沿海地带
    饮食: 生食海洋肉类，嗜好智慧生物的新鲜血肉
  文化与传统:
    社会: 极权神权社会，由大祭司管理；极度崇拜“星之眷族”，无条件服从其指令
    核心: 狂热的单一神权崇拜，社会活动围绕取悦三位旧日支配者
  性格倾向: 冷酷、极度理智、傲慢且排外；不具备同情心，视未转化的陆地生物为“孵化器”或“储备粮”；极有耐心，计划时间常逾越数百年
  能力: 深海高压生存, 水下呼吸, 超强肉体再生, 精神控制, 精神污染, 梦境干涉, 水系魔法
  弱点: 依赖水分，干燥环境中皮肤龟裂，战斗力下降