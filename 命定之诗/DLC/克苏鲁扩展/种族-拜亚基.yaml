# 拜亚基
  别称: 星间行者, 黄衣之王的猎鹰, 星海的吹笛人
  核心定义: 源自星海彼端与异界荒域的星际种族，哈斯塔的下位仆从与生物载具；半尸半虫半鸟的嵌合体
  外貌特征: 身体呈二分结构，胸部有巨大膜翼，后体部有强壮下肢；皮肤冰冷具橡胶弹性；腹部“磁流管”赋予超高速空间旅行能力
  寿命: 永生
  生命机制: 代谢极度缓慢，几乎停滞，不需要睡眠，不会衰老
  生活习惯:
    栖息地: 无空气的荒凉小行星或彗星核，仅在特定魔法仪式召唤下降临地表
    饮食: 汲取星光或宇宙辐射，也猎食其他生物
    习性: 星际空间中成群排成一列，有节奏拍打翅膀
  召唤与骑乘: 需特定星象夜晚用石哨吹奏旋律召唤；骑乘需饮用黄金蜂蜜酒进入假死状态
  文化与传统: 蜂巢思维，无个人意志，完全服从持有黄衣印记的高位存在或召唤者；星际搬运工与信使
  性格倾向: 机械般冷漠，仅服从力量与契约；可驯服，但召唤者失控会被攻击
  能力: 星际折跃, 真空生存, 高物理抗性
  弱点: 大气层内行动略受阻碍