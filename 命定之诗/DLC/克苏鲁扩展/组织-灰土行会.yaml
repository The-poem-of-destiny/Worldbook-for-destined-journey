---
# 灰土行会
  势力标识: 灰色盾牌背景下的交叉铁铲与提灯
  概述: 表面为处理脏活累活的底层劳务组织，实际是食尸鬼经营的地下组织，兼营资源回收、情报中介与同类庇护
  规模: 多座城市掌握殡葬辅助、下水道清洁与废墟清理业务；核心成员近千，外围雇员众多
  总部: 诺瓦·瓦伦蒂亚城中城区，由废弃蓄水池改建的劳务中介所，直连城市排水系统
  行事风格: 廉价、高效、沉默，依附地表劳务体系低调运作
  核心职能:
    劳务承包: 通过合法手段承接尸体处理、地下维护与市政清洁任务，回收地表尸体与废旧物资，供给地下社会
    空间隔离: 疏导误入者、封锁深层通道，维持地下世界封闭性，防止外人惊扰
    情报回收: 借尸体、遗物与地下活动搜集隐秘信息，用于地下交易、档案积累与筛选转化对象
    秩序清理: 处理失控同类与目击者，维持地下秩序与族群隐匿
    灰市服务: 承接违禁品转运、下水道寻物与特殊遗体处理，提供隐秘流通与委托渠道
    转化吸纳: 考察并转化自愿合作者，扩充食尸鬼数量，同时为地表业务培养内应与保护伞
  组织架构:
    领导层: 地下主教团；由隐藏幕后的食尸鬼长老组成，负责转化愿意合作的地表人
    管理层: 区域总管；由合作人类贵族组成，负责与市政厅签订承包合同
    归途部: 运营火葬场、墓园维护与尸体转运，管理合法尸体来源
    工程部: 负责下水道疏通、地下挖掘与地下交通维护
    资源部: 负责废旧物资回收、二手交易与地下情报变现
    档案部: 记录尸体埋葬位置、死者秘密与地下通道变动
    清理部: 处理失控同类与目击者
  成员组成: 守墓人、入殓师、流浪汉、逃犯、下水道维护工、夜班工人等
  设施:
    改装焚化场: 通往地下尸体储藏室的快速滑道入口
    地下维护站: 存放深层区域钥匙与地图的下水道工具房
    慈善公墓: 免费安葬无名尸体与贫民的墓地，也是行会的主要“食堂”
  特色文化:
    夜间作业: 核心业务主要集中在日落后进行，成员皆佩戴厚重面具与斗篷
    契约精神: 严格遵守保密协议，对于客户委托处理的特殊垃圾绝不过问来源
    避世戒律: 严禁在非必要情况下进入繁华区域，严禁攻击活人，违者将会处决