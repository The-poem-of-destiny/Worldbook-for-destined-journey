---
势力-渊洋王庭:
  概览:
    定位: 统辖大陆全域深潜者及海眷属的最高神权政体
    标识: 黑色独石碑上的螺旋与复眼纹章
    首都: 沉没古城拉莱耶(位于深海大漩涡下方)
    宗旨:
      - 侍奉旧日: 维护星位仪式，为古神苏醒预备环境
      - 血脉回归: 同化陆地种族，扩张眷属数量
      - 遗物看守: 守护深海古代封印，防止神性流失
    行事风格: 排外、狂热、高压、冷酷、隐匿
    领导层: 大祭司团(由十二位大祭司组成)
    信仰: 父神达贡、母神海德拉、拉莱耶之主
    主要据点: 无尽海、碎星群岛、沿海城市据点
    文化符号: 星位图、活祭仪式、深海低语
