  政治与社会:
    权力结构:
      政体: 绝对神权制，以梦境之主的神谕为最高指示
      管理层: 以聆听神谕的大祭司为中心，由太古者管理其他深潜者
      军备:
        银鳞卫队: 装备生物活体甲胄的深海宪兵
        巨兽军团: 驱役巨型海怪作为攻城单位
      下属机构:
        汐链商会联盟: 负责沿海资源搜集、血脉安置与长期渗透
        筑城者行会: 负责海底建设与神庙修缮
    阶级体系:
      梦境之主(达贡、海德拉、克苏鲁): 精神图腾与最高意志
      星之眷族: 神之使徒，负责传达神谕，掌握神话级法术
      太古者/大祭司: 深潜者领袖，核心管理层
      纯血种: 贵族阶层，管理混血后代与转化者
      转化者/混血: 基础公民，负责具体劳务与战斗
      沿海住民: 祭品、交易对象与待转化者
    对外关系:
      定位: 隐匿于深海与沿海地带的神权势力
      操控: 幕后操纵汐链商会，间接影响沿海贸易、港口秩序与海域开发
      合作: 与其他异种势力稍有合作，但也有摩擦
      无视: 对陆地其他种族毫不在意，除非异类存在暴露
