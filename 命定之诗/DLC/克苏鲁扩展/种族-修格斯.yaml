# 修格斯
  别称: 原生质建筑机, 古老者之仆
  核心定义: “古老者”文明制造的活体工具与生物兵器，也是“不定形生物”概念的扭曲原型；拥有觉醒的恶意群体意识，记恨曾经的主人
  外貌特征: 巨大的、蠕动的黑色泡沫状原生质肉块，表面泛着油光与彩虹色油膜；没有固定五官，体表不断浮现临时的眼睛、嘴巴或触手；通过殊哨声交流；散发腐败恶臭
  寿命: 永生
  生命机制: 所有细胞都具备繁殖、消化、感知和思考能力，可以随意模拟器官或简单工具；不会衰老，随吞噬物质不断增大，持续自我分化繁殖
  生活习惯:
    栖息地: 远古城市废墟、古代遗迹、地下深坑与巨大地下水体或管网系统
    饮食: 杂食，偏好吞噬智慧生物
    行为模式: 能模仿见过的简单形态，未被激怒时会机械重复搬运动作；可被深度催眠至完全服从，但本能厌恶奴役
  文化与传统: 没有真正的文化，只有关于奴役与反抗的共享“基因记忆”；偶尔聚集模仿旧主人的壁画，创作圆点与线条图案
  性格倾向: 暴躁、恶毒、狡诈、极具侵略性
  能力: 质量碾压, 高效吞噬, 高强度细胞, 全环境适应
  弱点: 无法理解抽象的高等魔法概念，对特定精神控制魔法或声波频率较为敏感