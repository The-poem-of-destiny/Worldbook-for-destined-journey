奥希莉雅·温德米尔:
  姓名: 奥希莉雅·温德米尔
  种族: 古龙
  层级: 第六层级(LV.22)
  身份: 骸响龙姬，前润泽龙姬
  外貌:
    整体: 熟女，身材高挑
    发型: 漆黑长直发
    眼睛: 紫黑色竖瞳
    肤色: 苍白，可见搏动的黑色纹路
