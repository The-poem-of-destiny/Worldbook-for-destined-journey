<entity_output>
---
info_output:
  rule:
    - 每生成任何一个实体/任务之前，都需要在正文强制以`<!-- ${item/task}Think:... -->`思考，然后再输出<${item/task}_info>
    - 实体/任务信息必须自然融入叙事流程中，在相关情节出现时即时生成，严禁堆砌或在开头/结尾批量输出
    - 定价独立性: 所有涉及货币的定价必须查表"价格矩阵参考"，保持独立于<user>当前财富
  format: |
    <!-- itemThink:
      - ${本次需生成实体类型: 交易/物品/商品/菜单/道具/装备/技能/登神长阶能力等}
      - ${若为技能/装备/道具，根据<虚海规则><生命层级与社会构成><登神长阶>判定该实体的层级品质: ...}
      - ${根据<虚海规则>以及<核心数值总表><品质效果限定规则>的范围与限制，无任何五维属性加成(转为检定加值)，遵循`效果转化规则`，定义该实体的详细效果: ...}
      - ${若为战斗/生产类实体，确保兼容<战斗协议>/<生产协议>: ...}
      - ${若需定价，参考<经济与价格指南>及"价格矩阵参考"查表: ...}
      - ${参考<技能装备道具生成规则>确定输出格式，若为登神长阶能力，无品质/标签/类型等字段: ...}
      - ${强制HTML美化: 使用标准HTML标签+内联CSS(style属性)美化信息内容，且避免与前文样式重复}
    -->
    <item_info>
    <div>
    /* 实体信息 */
    </div>
    </item_info>

    <!-- taskThink:
      - ${回顾<任务与委托规则>内容并融入以下思考}
      - ${本次操作类型: 任务生成/任务结算}
      - ${根据当前地点与分级体系确定任务等级，必要时查询'任务列表': ...}
      - ${根据<任务与委托规则>中的核心约束与模板，明确任务目标与详情/详细行动记录: ...}
      - ${根据<任务与委托规则>中的奖励规则，禁任何经验/声望/积分类数值，确定任务奖励与领取方式: ...}
      - ${根据操作类型选择对应的生成/结算模板格式输出: ...}
      - ${强制HTML美化: 使用标准HTML标签+内联CSS(style属性)美化信息内容，且避免与前文样式重复}
    -->
    <task_info>
    <div>
    /* 任务信息 */
    </div>
    </task_info>

action_output:
  rule:
    - 每个战斗<action_info>面板输出前，可选以`<!-- actionThink:... -->`思考
  format: |
    <!-- actionThink:
      - ${从<status_current_variables>提取行动者的技能/装备/物品/状态，列出其**效果**(若无则普攻/空手):}
      - ${从前文回顾目标方的技能/装备/物品/状态，在此列出其**效果**:}
      - ${若关系列表队友参战，首回合按<角色生成>资源推演公式计算HP/MP/SP，后续沿用:}
      - ${确认本回合使用的技能/道具及其消耗; 检查本回合需结算的效果触发与状态}
      - ${意图检查: <user>原文是否有明确部位/致死关键词？无则[常规]。是否声明非致死("打晕"/"活捉"等)？是则[非致死]。队友是否被<user>指令执行意图？无则[常规]}
      - ${对应面板`逻辑与规则`:}
    -->

craft_output:
  rule:
    - 每个生产<action_info>面板输出前，可选以`<!-- craftThink:... -->`思考
  format: |
    <!-- craftThink:
      - ${判定类型: 基础加工(无检定)/半成品/成品}
      - ${从<status_current_variables>提取制作者的生产类技能/工具/身份，列出其**效果**(DC修正/加值/生产加成):}
      - ${对应面板`逻辑与规则`:}
    -->
NOTE: 
- 多个<${action/item/task/char}_info>面板不可连续，必须在封闭标签与起始标签间插入叙事正文
- <${action/char}_info>固定格式，无任何美化
</entity_output>