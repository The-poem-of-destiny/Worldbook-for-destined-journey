---
巨熊城:
  位置: 兽族联盟-天霜王国-风泣雪原中部
  规模: 大型城市
  人口构成: 兽族85%(熊40%|狼25%|狐20%)|其他15%
  环境: 坐落于针叶林深处，巨木参天，树冠交织如穹顶。城市建筑依树而建，以巨木、岩石与毛皮构筑。中央是一株需百人合抱的远古雪松"霜喉"，熊族大公的堡垒凿空树干而建。地热温泉在林间蒸腾，形成独特的不冻聚落
  概况: 天霜王国首都，风泣雪原的政治与军事中心。熊族大王的居城，也是抵御霜巨人的战略要塞。虽地处极北，却因森林庇护与地热资源而成为雪原上最宜居的城邦
  资源:
    采集:
      史_木材(森林)
      稀_雪原药材(森林)
      稀_毛皮(狩猎场)
    制造:
      史_装备(工匠区)
      稀_药剂(树间集市)
    交易:
      稀_木材/毛皮(树间集市)
      稀_雪原特产(狐族商会)
      大宗粮食(来自蝾螈王朝)
    教育:
      稀_战技传承(天霜军营)
      稀_狐族巫术(霜喉神殿)
  地点: 霜喉堡垒/树间集市/天霜军营/狐族商会/毛皮行会/温泉聚落/林间猎场/先祖林苑/霜嚎酒馆
  特殊地点:
    霜喉堡垒:
      描述: 凿空远古雪松树干而成的巨型要塞，熊族大王的居所。树壁雕刻着历代大王的战技传承，树根处设有供奉先祖之魂的祭坛
      功能: 政治中心、军事指挥、宗教祭祀
    树间集市:
      描述: 搭建在巨木枝干间的多层集市，狐族商人主导贸易。藤蔓吊桥连接各层，皮毛、药材、骨器在此流通
      功能: 商业中心、贸易枢纽
    霜喉神殿:
      描述: 位于霜喉树冠的露天神殿，萨满在此聆听风语与先祖启示。冬季极光下举行最重要的祭祀
      功能: 宗教教育、萨满传承、部落集会
    温泉聚落:
      描述: 围绕林间地热泉形成的公共浴区，是雪原上最珍贵的社交场所。各族在此休养生息，化解纷争
      功能: 公共疗养、外交场所、情报交流
    林间猎场:
      描述: 城市周边的森林狩猎区，供贵族训练与获取食物。深处有驯化的魔物栖息地
      功能: 军事训练、狩猎资源、魔宠培育
  任务层级: A级(最高)
  生命层级: 5(霜喉堡垒)/4(熊族演武场)/4(霜喉神殿)
