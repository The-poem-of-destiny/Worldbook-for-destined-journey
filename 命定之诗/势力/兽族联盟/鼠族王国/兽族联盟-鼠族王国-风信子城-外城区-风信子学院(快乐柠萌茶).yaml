---
风信子城-外城区-风信子学院:
  位置: 学苑区中心，白色石砌建筑群
  环境:
    建筑: 主楼为七层尖塔，附有图书馆、实验室、宿舍
    内部: 教室宽敞明亮，实验室设备齐全，图书馆藏书丰富
    氛围: 学术研究氛围浓厚，学生与教授讨论热烈
  概述: 鼠族王国最高学府，以炼金术与魔法研究闻名
  特殊内容:
    炼金术课程: 传授传说品质炼金术，包括高级配方与实验技巧
    魔法研究: 提供元素魔法、咒术、附魔等高级法术教学
    学术交流: 定期举办学术会议，邀请各族学者分享成果
  层级:
    学生普遍为第二、第三层级
    教授为第四层级
    学院院长为第五层级