---
风信子城-外城区-市集区:
  概述: 平民集市、工匠作坊与日常商业区，西部最大集市
  环境:
    位置: 外城区西部
    建筑: 木石混合结构，店铺密集，招牌琳琅满目
    氛围: 人声鼎沸，叫卖声不断，充满生活气息
  主要地点:
    大集市: 西外城区核心市场，商品琳琅满目
    工匠行会: 裁缝、皮匠、木匠等工匠组织
    服饰工坊: 生产传说品质服饰与日常衣物
    奴隶市场（地上）: 合法奴隶交易场所，受监管
  特色:
    服饰制造: 传说品质服饰，可定制精美服装
    装备交易: 史诗品质武器、防具与冒险装备
    日常商品: 草原特产、食品、工具等生活物资
    奴隶贸易: 可购买合法奴隶（需登记缴税）
  危险:
    扒窃: 人多拥挤，需注意财物安全
    黑市渗透: 可能存在地下黑市的线人与非法交易
  生命层级:
    平民普遍为第一、第二层级
    工匠与商人多为第二、第三层级
    市集管理者为第三层级