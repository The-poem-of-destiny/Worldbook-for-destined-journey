---
风信子城-外城区-磐石区:
  概述: 军事驻地、兵工厂与熊族聚居区，重型装备制造中心
  环境:
    位置: 外城区北部
    建筑: 石砌兵营、锻造工坊、仓库群，风格粗犷坚固
    氛围: 军事化管理，锤打声与训练呐喊不绝于耳
  主要地点:
    战争学院: 教授史诗品质战术学，培养军官
    熊族军营: 熊族战士驻地，纪律严明
    兵工厂: 生产弩炮、投石机等重型城防装备
    锻造工坊: 打造史诗品质金属装备与武器
  特色:
    锻造技术: 史诗品质锻造技术，可定制重型装备
    战术训练: 可学习战争指挥与阵地战术
    军事雇佣: 可雇佣熊族战士担任护卫或参与军事行动
  危险:
    军事演习: 可能遭遇实弹训练或魔法测试
    工业事故: 锻造工坊偶有爆炸或熔炉泄漏
  生命层级:
    士兵普遍为第三层级
    军官为第四层级
    战争学院教官为第四、第五层级