---
风信子城-外城区:
  环境:
    位置: 风信子城外城，星形棱堡结构，环绕护城河
    地势: 略高于周边草原，便于防御与瞭望
    气候: 草原气候，春季多风，夏季温和，秋季凉爽，冬季寒冷
    护城河: 宽50米，深5米，水流湍急，河底设尖桩，仅可通过四座主门吊桥进入
  建筑:
    城墙: 灰褐色巨石砌筑，厚10米，高15米，设有七座棱堡，提供交叉火力
    城门: 八座大门（四主四辅），主门设有双层闸门与箭塔
    防御工事: 棱堡配备重型城防弩炮、投石机平台与魔法塔，城墙设有弩炮台
    民居: 多为石木结构，平顶或斜顶，坚固实用
    街道: 石板铺就，宽阔笔直，便于部队机动
  人文:
    人口构成: 鼠族、熊族、狐族为主，兼有其他兽族、人类及少数种族
    治安: 由鼠族女王禁军与外城防军共同巡逻，纪律严明
    准入: 外城开放贸易，商旅需在城门登记并缴纳入城税
    特色: 军事氛围浓厚，随处可见兽族战士与商人，语言混杂
  主要危险:
    军事冲突: 作为前线要塞，可能遭受帝国袭击
    地下通道: 鼠族挖掘的通道网络，可能隐藏罪犯或危险生物
    黑市交易: 地下黑市存在违禁品与奴隶贸易，风险较高
  主要服务:
    军事雇佣: 可雇佣熊族战士或鼠族侦察兵
    贸易采购: 可购买草原特产、魔物素材、优育畜群
    装备制造: 可在工匠区定制史诗品质装备
    奴隶市场: 地下黑市提供奴隶交易（合法但受监管）
  生命层级:
    居民普遍为第二、第三层级
    守军士兵为第三层级
    棱堡指挥官为第四层级
    外城防军统帅为第五层级
  区划:
    北外城区(磐石区): 军事驻地、兵工厂与熊族聚居区，重型装备制造中心
    东外城区(商路区): 狐族贸易枢纽与各国商会驻地，东部商路起点
    南外城区(学苑区): 学者、学院与炼金工坊聚集地，鼠族王国教育中心
    西外城区(市集区): 平民集市、工匠作坊与日常商业区，西部最大集市
  标志性地点:
    星棱堡: 最大的棱堡，驻有外城防军司令部
    狐族商会: 狐族贸易中心，提供跨国贸易服务
    风信子学院: 鼠族王国最高学府，炼金术与魔法研究领先
    大集市: 西外城区核心市场，商品琳琅满目
    地下黑市: 位于通道网络深处，交易违禁品与奴隶