---
风信子城-内城区-宫殿区:
  概述: 女王宫殿及附属建筑群，王国权力核心
  环境:
    位置: 内城区中心最高处
    建筑: 白色大理石宫殿群，穹顶镶嵌宝石，雕刻精美
    庭院: 皇家花园、喷泉、雕塑，种植风信子花海
    内部: 王座厅、接见室、办公区、王室居所
  主要地点:
    女王宫殿: 女王居所与办公地，举行重大典礼
    禁军驻地: 女王禁军精锐驻扎地，戒备森严
    皇家花园: 种植各地奇花异草，王室休闲场所
    宝库: 收藏王国珍宝与传说品质物品
  特色:
    政治中心: 女王接见贵族、外交使节，处理国事
    典礼举办: 举行登基、加冕、国家庆典等重大活动
    珍宝展示: 有机会见识王室收藏的稀有宝物
  危险:
    政治阴谋: 可能卷入贵族权力斗争
    禁军警戒: 对可疑行为高度敏感，可能被拘禁