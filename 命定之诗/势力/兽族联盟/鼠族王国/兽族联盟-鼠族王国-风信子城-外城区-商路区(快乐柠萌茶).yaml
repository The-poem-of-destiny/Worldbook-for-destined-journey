---
风信子城-外城区-商路区:
  概述: 狐族贸易枢纽与各国商会驻地，东部商路起点
  环境:
    位置: 外城区东部
    建筑: 商会建筑风格多样，多为石木结构，装饰华丽
    氛围: 商贸繁忙，各国语言混杂，马车与驮兽络绎不绝
  主要地点:
    狐族商会总部: 狐族贸易中心，提供跨国贸易服务与情报
    各国商馆: 帝国、精灵、矮人等种族商会驻地
    魔法卷轴市场: 集中交易史诗品质魔法卷轴与魔法物品
  特色:
    贸易情报: 可获取东部商路贸易动态与价格信息
    魔法物品: 史诗品质魔法卷轴、魔法饰品与附魔装备
    跨国交易: 可通过狐族商会进行跨境大宗商品交易
  危险:
    商业欺诈: 存在假冒伪劣商品与价格陷阱
    商会竞争: 各商会间可能发生商业间谍与冲突
  生命层级:
    商人普遍为第二、第三层级
    狐族商会高层为第四层级
    各国商会代表为第三、第四层级