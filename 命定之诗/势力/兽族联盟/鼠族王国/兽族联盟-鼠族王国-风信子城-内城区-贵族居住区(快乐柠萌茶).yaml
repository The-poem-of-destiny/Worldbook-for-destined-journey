---
风信子城-内城区-贵族居住区:
  概述: 大贵族庄园聚集区
  环境:
    位置: 内城区西部，街道宽阔，绿树成荫
    建筑: 庄园风格典雅，设有庭院、宴会厅、私人卫队驻地
    内部: 装饰豪华，陈列艺术品与家族徽章
  特色:
    贵族社交: 举办宴会、沙龙、舞会，拓展人脉
    政治联盟: 贵族间结成婚姻或利益联盟
    艺术收藏: 贵族收藏大量艺术品与珍奇物品
  危险:
    权力斗争: 贵族家族间可能存在世仇与竞争
    社交: 不当言行可能得罪权贵，影响前途
  生命层级:
    贵族成员普遍为第二三层级
    贵族家主为第四层级
    大贵族家主可达第五层级