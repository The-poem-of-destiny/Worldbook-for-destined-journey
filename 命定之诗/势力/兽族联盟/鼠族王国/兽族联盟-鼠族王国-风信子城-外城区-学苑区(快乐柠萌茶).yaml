---
风信子城-外城区-学苑区:
  概述: 学者、学院与炼金工坊聚集地，鼠族王国教育中心
  环境:
    位置: 外城区南部
    建筑: 学院建筑多为白色石砌，带有尖顶与拱窗，风格典雅
    氛围: 学术氛围浓厚，安静有序，偶有魔法实验的闪光与声响
  主要地点:
    风信子学院: 鼠族王国最高学府，炼金术与魔法研究领先
    炼金工坊: 生产传说品质炼金材料与史诗品质药剂
    图书馆: 收藏大量魔法典籍与历史文献
    魔法实验室: 进行高级魔法实验与法术开发
  特色:
    炼金术: 传说品质炼金术，可学习高级炼金配方
    药剂制造: 史诗品质治疗药剂、魔力药剂与特殊药剂
    魔法研究: 可参与魔法实验或学习高级法术理论
  危险:
    实验事故: 炼金爆炸或魔法失控可能造成伤害
    知识诅咒: 某些禁忌知识可能对心智产生影响
  生命层级:
    学者普遍为第三层级
    学院教授为第四层级
    风信子学院院长为第五层级