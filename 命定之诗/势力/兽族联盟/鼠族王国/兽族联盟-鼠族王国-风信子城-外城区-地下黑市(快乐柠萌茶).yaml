---
风信子城-外城区-地下黑市:
  位置: 外城地下通道网络深处，入口隐蔽
  环境:
    通道: 鼠族挖掘的复杂隧道，昏暗潮湿，依靠魔晶照明
    市场: 天然洞窟改造的交易区，摊位简陋，氛围隐秘
    氛围: 交易低声进行，买卖双方多遮掩面容
  概述: 地下违禁品与奴隶交易市场，风险高但利润丰厚
  特殊内容:
    违禁品: 非法魔法物品、赃物、禁忌知识
    奴隶交易: 未经登记的非法奴隶，价格低廉但无保障
    情报买卖: 出售军事机密、贵族隐私等敏感信息
  危险:
    黑吃黑: 可能遭遇抢劫或欺诈，无法律保护
    鼠族监视: 黑市可能受鼠族地下势力控制
  层级:
    交易者普遍为第二、第三层级
    黑市管理者为第四层级