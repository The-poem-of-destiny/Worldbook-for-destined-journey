---
风信子城-外城区-大集市:
  位置: 市集区中心，占地广阔的露天与棚屋市场
  环境:
    布局: 分区经营，包括装备区、服饰区、食品区、杂货区
    设施: 摊位密集，道路狭窄拥挤，设有治安岗亭
    氛围: 人声鼎沸，叫卖声、讨价还价声不绝于耳
  概述: 西外城区核心市场，商品琳琅满目，日常交易中心
  特殊内容:
    装备交易: 史诗品质武器、防具、冒险装备
    服饰定制: 传说品质服饰，可量身定制
    特产采购: 草原优质皮毛、魔物素材、优育畜群
    奴隶市场: 地上合法奴隶交易区（需登记缴税）
  规范:
    交易税费: 货币交易收取1%市场税
    治安管理: 市场卫队巡逻，禁止暴力冲突
  层级:
    商贩普遍为第一、第二层级
    市场管理者为第三层级