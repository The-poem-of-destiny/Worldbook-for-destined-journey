---
鼠族王国-风信子城:
  标识:
    位置: 恒风草原中部大型水源地旁
    规模: 大型城市
    人口构成: 鼠族45%|熊族15%|狐族10%|其他兽族15%|人类8%|其他种族7%
  概况: 兽盟西部最大贸易枢纽，连接草原各部与帝国商路，也是对抗奥古斯提姆帝国的战略支点
  历史: 复兴纪元120年，鼠族女王受兽族联盟霸主命令在此建城，历经三百余年扩建
  环境: 地势较高，便于防御，草原气候，四季分明
  布局:
    总体结构: 采用双重城墙系统，外城为棱堡状军事要塞，内城为方形城墙，设有多个塔楼
    外城: 星形棱堡结构，设有六座棱堡，城墙魔法金属铸造坚固无比，配备重型城防魔炮与魔法防御阵列
    内城: 方形城墙，整座城墙由魔石砖与青石砌筑
    城门: 外城四座大门，内城四座正门
  主要资源:
    购买:
      史_炼金/金属材料(外城区)
    制造:
      传_服饰(市集区)
      史_装备/药剂(外城区)
      史_魔法物品(外城区)
    贸易:
      史_装备(外城区)
      奴隶(黑市)
      皮毛、魔物素材、优育畜群(城外部落)
    教育:
      传_炼金术(郁金香学院)
      史_锻造技术(外城区)
  主要城区:
    内城区: 位于城市中心，方形城墙包围的贵族区、行政中心和外交驻地
    外城区: 位于外城的工业、商业、教育中心、军事驻地、主要居民区
  特殊地点:
    郁金香学院: 鼠族王国最高学府，建校历史仅两百余年，底蕴较浅
  额外地点: 链接各地的官道
  任务层级: S级(最高)
  最高生命层级: 5(内城)/5(冒险者公会)/4(黑市)