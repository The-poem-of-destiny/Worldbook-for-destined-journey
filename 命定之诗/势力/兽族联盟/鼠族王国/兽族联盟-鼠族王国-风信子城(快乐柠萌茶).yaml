---
鼠族王国-风信子城:
  标识:
    位置: 恒风草原中部，毗邻葱茵湖
    规模: 大型城市
    人口构成: 鼠族45%|熊族15%|狐族10%|其他兽族15%|人类8%|其他种族7%
  概况: 兽族联盟西部最大的贸易枢纽，连接草原各部与帝国商路，同时也是对抗奥古斯提姆帝国的战略支点
  历史: 复兴纪元120年，鼠族女王奉兽族联盟霸主之命于此建城，历经三百余年不断扩建而成
  环境: 地势较高，利于防御；草原气候，四季分明
  布局:
    外城: 正八角形结构，城墙由魔法金属铸造，坚固无比，配备重型城防魔炮与魔法防御阵列，每个角均设有防御塔楼
    内城: 正圆形城墙，通体由白色魔石砖砌筑
  主要资源:
    购买:
      史_炼金/金属材料(外城区)
    制造:
      传_服饰(市集区)
      史_装备/药剂(外城区)
      史_魔法物品(外城区)
    贸易:
      史_装备(外城区)
      奴隶(黑市)
      皮毛、魔物素材、优育畜群(城外部落)
    教育:
      传_炼金术(郁金香学院)
      史_锻造技术(外城区)
  主要城区:
    内城区: 位于城市中心，是行政中心、贵族居住区与物流核心
    外城区:
      东北角: 铸鳞区，兽族联盟联军驻扎地，军眷形成社区，军事法庭亦设于此
      东部角: 铁桥区，主要仓储区，大宗货物存放地，亦是城市正门所在
      东南角: 天秤区，商贸集中地，大型集市、商铺、银行汇聚于此
      西南与南部角: 炉火区，主要居民居住地，旅馆、餐厅、剧院等服务行业密集，黑市暗中活动
      西部角: 圣录区，宗教与学术交织之地，修道院、教堂、学院聚集
      西北角: 青穗田，种植产地并与城外部落协作，负责城市后勤供应
      北部角: 匠艺区，各类工坊与手工艺聚集地
  交通:
    官道: 建有通向巡天王庭、草原各部以及连接帝国内部的官道
  任务层级: S级(最高)
  最高生命层级: 5(内城)/5(冒险者公会)/4(黑市)