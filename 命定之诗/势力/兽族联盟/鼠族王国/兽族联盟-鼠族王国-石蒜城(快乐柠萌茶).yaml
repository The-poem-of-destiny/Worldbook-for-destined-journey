---
鼠族王国-石蒜城:
  标识:
    位置: 神迹群山西侧
    规模: 中型城市
    人口构成: 鼠族80%|其他兽族18%|其他种族2%
    概况: 鼠族先祖千年前建造的洞穴古城，经过数百年开发形成繁荣的城邦，外围是依靠山脉河水灌溉的农田
    环境: 城市坐落于神圣山系西侧近乎垂直的崖壁上，主城挖进山体内部，拥有广阔的内部空间，通风和采光依靠魔法晶石和巧妙的光道设计。城市外围是梯田式农田，利用从山脉流下的雪水与河水灌溉
  主要资源:
    采集:
      史_金属(岩矿区)
      稀_非金属材料(山脉、河谷原)
    制造:
      稀_装备(主城区)
      稀_石材加工(主城区)
      史_魔法金属加工(根心区秘术工坊)
    贸易:
      稀_炼金药剂(狐族商会)
      稀_材料(狐族商会)
    教育:
      史_采矿与冶金(岩矿区匠人)
      稀_魔法、材料、建筑学(根心区)
  主要城区:
    外壁区:
      描述: 山体外壁上的洞穴住宅，洞穴入口以石雕装饰，曾是主要居住区，现作为景区，满是旅馆和小商铺，通过栈道和悬梯连接，夜晚灯火如星点
    石蒜主城:
      描述: 山体内部的主城区，街道以石板铺就，两侧建筑多为石砌，穹顶镶嵌高亮度魔晶，不分昼夜，中央广场设有大型喷泉
      功能: 主要居民区、商业、行政、文化娱乐
    根心区:
      描述: 主城最深处，王族旧行宫、议会大厅和神殿所在地，也是学院所在地，建筑宏伟，装饰华丽，是政治与宗教中心
    河谷原:
      描述: 山脚下的农田区，阶梯式田垄沿山势展开，水渠系统发达，农舍散布其间，秋季一片金黄
    岩矿区:
      描述: 山体内部的矿区，隧道纵横，金属材料充沛，有少量魔法金属矿物，匠师用岩浆加工金属
  任务层级: A级
  最高生命层级: 4(根心区)/4(内城区)/3(矿脉区)