---
风信子城-内城区-行政区:
  概述: 王国政府机构集中地，处理全国政务
  环境:
    位置: 内城区东部，毗邻宫殿区
    建筑: 石砌政府大楼，风格庄重，设有档案室与会议厅
    内部: 办公区整洁有序，官员忙碌处理文件
  主要地点:
    王国议会厅: 仿帝国议会建筑，圆形大厅，议员商讨国事
    财政部: 管理王国财政、税收与预算
    司法部: 制定与执行法律，审理重大案件
    外交部: 处理外交事务，接待外国使节
  特色:
    政策制定: 可获取王国最新政策与法律变动信息
    官员联络: 有机会接触高级官员，办理行政事务
    档案查询: 可申请查阅非机密政府档案
  危险:
    官僚程序: 繁琐的行政流程可能耗费时间
    政治敏感: 某些话题可能涉及国家机密
  生命层级:
    普通官员为第三层级
    部门主管为第四层级
    议会官员为第四、第五层级