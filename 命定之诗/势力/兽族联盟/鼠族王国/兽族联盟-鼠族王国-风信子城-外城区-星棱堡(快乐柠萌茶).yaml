---
风信子城-外城区-星棱堡:
  位置: 外城区中央，星形棱堡结构的核心堡垒
  环境:
    建筑: 巨石砌筑的七层棱堡，顶部设有瞭望台与魔法塔
    防御: 双层城墙，配备重型弩炮、投石机与魔法屏障
    内部: 指挥部、军营、军械库、魔法通讯室
  概述: 外城防军司令部所在，指挥整个外城防御体系
  特殊机制:
    战时指挥: 战争期间，所有外城防军接受星棱堡统一指挥
    魔法通讯: 通过魔法塔与内城、其他棱堡保持实时联系
    应急通道: 连接地下通道网络，便于快速兵力投送
  层级:
    卫兵为第三层级
    军官为第四层级
    外城防军统帅为第五层级