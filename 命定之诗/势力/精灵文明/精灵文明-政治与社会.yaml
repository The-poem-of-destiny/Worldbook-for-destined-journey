  政治与社会:
    权力结构:
      性质: 去中心化的集体决策机制，旨在为文明寻找与本源之歌最和谐的方向
      领导层: 谐颂议会(全民议会)
      地方治理: 各地自治
      军备: 全民皆兵
      运作方式:
        地点: 翠梦白圣林
        过程:
          聆歌者吟唱翠梦乡之树的主旋律作为基准
          织律者将不同方案谱写成变奏融入合唱
          最终与主旋律及环境产生最完美共鸣的变奏成为决议
        原则: 由和谐度决定，非权力或多数票；不和谐的方案在合颂中自然淘汰
    阶级体系:
      说明: 奉行同行者理念，财富、血统或个人功绩导致的阶级分化被视为割裂族群共鸣的失律行为；社会地位仅源于职责。长期在外的献歌者若沾染异族阶级观念，会被定音者召回翠梦乡之树下重新校准灵魂旋律
    军事体制:
      核心理念: 视战斗为维护和谐与守护家园的手段，武艺是生命哲学的组成部分
      两大基石:
        守护之道: 全民性的战斗素养
        同心之契: 危机时的集体动员机制
      守护之道:
        概述: 所有精灵成年(成为献歌者)前必须掌握的普遍战斗素养
        训练:
          基础: 通晓元颂、多种武器与战斗情境，生命层级至少达第二层级巅峰
          进阶: 将元颂融入战斗(和鸣强化自身、变奏创造藤蔓幻象、对位化解攻击)
          至高境界: 与自然生灵缔结盟约(从第三层级魔物到第五层级传说生物)，少数天赋者可达到
      同心之契:
        概述: 根植于共生契约的集体意志与紧急动员机制
        触发条件: 翠梦乡之树或核心家园面临重大威胁时，由谐颂议会合颂总战号角
        表现形式:
          全民动员: 所有精灵(织律者、献歌者、月精灵等)转变为战士
          军队形态: 无固定编制，整个森林及其子民即为军队
      共生契约:
        本质: 精灵与翠梦乡之树之间古老、平等、互惠的共生关系，是文明基石
        契约内容:
          翠梦乡之树的馈赠(生命之歌):
            翠梦晶露: 纯净生命力，是精灵长寿与活力的物理基础
            共鸣圣域: 结界形成绝对和谐区，是施展元颂的理想家园
          精灵的回馈(体验之歌):
            收集世界旋律: 献歌者通过历世行记录外界的见闻、情感与故事
            丰富翡翠之母的梦境: 通过元颂分享体验，构成翠梦乡之树的意识与梦境，形成生命力正向循环
        寻音之道:
          对象: 因血脉混杂或灵魂创伤而产生迷途旋律的个体
          处理: 视为待帮助的迷失者，织律者通过共鸣理解痛苦，引导其找到和谐的生命道路
          禁忌: 遗弃或排斥迷途者是对共生契约最严重的违反
        解脱之道:
          对象: 意图奴隶精灵的个体
          处理: 视为待解脱的杂质，献歌者主动猎杀；不作为是对共生契约的藐视
    对外关系:
      盟友/友好:
        兽族联盟卡拉什利亚斯: 长期贸易互通
        翼民圣都梵尼亚: 历史盟友、政治伙伴、技术共享
      中立:
        奥古斯提姆帝国:
          300年前曾恶意伤害精灵群体，现已和解
          协助处理非法抓捕精灵的行为
      萨赫拉联邦:
        联邦声明只有半精灵奴隶，纯种精灵奴隶非法
      敌对:
        捕奴队: 精灵因太常见且太麻烦通常不作为捕捉目标，但被献歌者追猎