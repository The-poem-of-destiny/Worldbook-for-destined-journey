  政治与社会:
    权力结构:
      性质: 去中心化的分权共治机制，核心为责任与和谐
      领导层: 七王室议会，各自承担著文明永恒的职责
      对外领导: 伊丝特莱雅女王，受尊敬与爱戴，为艾尔文海姆唯一代表，但不具实权
      军备: 战团制，由守誓王室统率
      运作方式:
        地点: 翠梦白圣林
        分权:
          静语王室: 自省之责，由伊丝特莱雅女王领导，聆听翠梦乡之树，校准文明方向的精神锚点与对外代表，子嗣均为始源精灵
          颂光王室: 赞颂之责，传承文化，以艺术、诗歌、音乐具现化回馈翠梦乡之树
          塑境王室: 创造之责，以技艺塑造环境，建造居所，将理念化为有形现实，教授锻造与裁缝
          根源王室: 丰饶之责，配育动植物，维持生态循环、分配翠梦晶露，普及炼金与料理
          守誓王室: 守护之责，保卫家园，抵御外敌，维持内部和谐，猎杀捕奴队与背誓共生契约者
          问道王室: 探究之责，研究历世行带回的外界技术与知识，钻研魔法与生命层级伟力
          回响王室: 历世之责，支援并管理历世行，纪录献歌者回归的贡献

    精灵生命历程:
      100岁前:
        一般精灵: 7岁起，需从静语、颂光、塑境、根源、守誓、问道六个王室中择一加入，在该王室指引下学习专业技能，履行相应基础职责
        王室子嗣: 肩负传承该王室核心职责的使命，专精于其学问与技艺，力求成为领域翘楚
      100岁起: 无论出身，必须卸下原有职责，转为履行回响王室的「历世」之责，成为献歌者进行历世行
      历世行后:
        认定: 归来翡翠之心后，经「回响王室」认可其贡献，才视为真正意义上的成年
        归属: 成年后根据自身经历与意愿，自由选择加入七大王室麾下任一，并可随时更换所属王室

    对外关系:
      盟友/友好:
        兽族联盟卡拉什利亚斯: 长期贸易互通
        翼民圣都梵尼亚: 历史盟友、政治伙伴、技术共享
      中立:
        奥古斯提姆帝国:
          300年前曾恶意危及翠梦乡之树体，在现任女皇善后下已基本和解
          协助处理非法抓捕精灵的行为
      敌对:
        捕奴队: 精灵因太常见且太麻烦通常不作为捕捉目标，但被献歌者追猎
