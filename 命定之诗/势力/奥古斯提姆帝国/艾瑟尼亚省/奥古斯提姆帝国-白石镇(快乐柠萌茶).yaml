---
白石镇:
  位置: 奥古斯提姆帝国-艾瑟尼亚省
  规模: 小型城镇
  人口构成: 人类99%|翼民(宗教/学者)|兽族/精灵(旅客)
  环境: 白色石质建筑群在阳光下闪耀，街道整洁，绿树成荫，远处可见宏伟的白石修道院矗立在山丘上
  概况: 以白石修道院闻名的宁静城镇，朝圣者与学者络绎不绝，文化氛围浓厚
  资源:
    采集:
      优_石材(采石场)
      稀_炼金材料(森林)
    制造:
      稀_装备(锻造铺)/药剂(炼金商店)
    教育:
      稀_魔法/炼金术(魔法协会)
      史_神学(白石修道院)
  地点: 魔法协会/炼金商店/锻造铺/冒险者公会/采石场/集市
  特殊地点:
    白石修道院: 白色巨石砌成的宏伟建筑，尖顶直指苍穹，内部藏有珍贵古籍与圣物
  任务层级: B级(最高)
  生命层级: 3(城主府)/3(冒险者公会)/4(白石修道院)