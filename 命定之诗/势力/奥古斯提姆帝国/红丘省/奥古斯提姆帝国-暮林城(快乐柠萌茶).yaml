---
暮林城:
  位置: 奥古斯提姆帝国-红丘省
  规模: 大型城市
  人口构成: 人类80%|兽族5%(商品/奴隶)|矮人/龙裔4%|精灵5%(旅客)
  环境: 红松林环绕的城市，建筑多采用石木质材料，阴凉的气候使得城市常年笼罩在薄雾中，林间小径通往各处
  概况: 省份资源中心，以优质木材和农业产品闻名，林业与农业并重的大型城市
  资源:
    采集:
      稀_木材(林场)/炼金材料(暮光森林)/农作物(农业市场)
    制造:
      史_木制品(木工坊)
      稀_装备(锻造公会)/药剂(炼金公会)
    交易:
      史_林业产品(木材交易所)
      稀_农产品(市场)
    教育:
      稀_魔法/农业技术(魔法学院)
  地点: 林场/木工坊/锻造公会/炼金公会/魔法学院/木材交易所/农业市场/冒险者公会/黑市
  特殊地点:
    红松林场: 连绵不绝的森林，专供优质木材，由林务官管理
    暮光神殿: 位于森林深处的古老神殿，供奉森林圣灵
    木材交易所: 巨大的石质建筑，设有防火法阵，各地木材商在此交易
  任务层级: B级(最高)
  生命层级: 5(城主府)/4(冒险者公会)/4(黑市)