---
冰峨镇:
  位置: 奥古斯提姆帝国-碧霜省，碎冕冰脊南麓
  规模: 小型矿业城镇
  人口构成: 人类60%|矮人35%(矿工/工匠/工程师)|其他5%(奴隶、商人、旅客)
  环境: 坐落于碎冕冰脊山脚，气候严寒，常年覆雪。镇区依山而建，矿井深入山体，隧道错综复杂
  概况: 以开采“冰脉矿”为主的矿业城镇。矮人氏族掌控核心采矿技术与锻造工坊，人类负责行政与贸易
  资源:
    采集:
      稀_冰脉矿(主矿脉)
      稀_炼金材料(伴生矿)
      稀_魔物材料(冰窟魔物)
    制造:
      稀_装备(锻造公会)
      优_抗寒药剂(炼金商店)
    交易:
      奴隶(劳工市场)
      稀_矿产(贸易站)
    教育:
      稀_采矿与锻造(矮人学徒制)
      优_魔法(魔法协会)
  地点: 矿井/贸易站/劳工市场/行政厅/冒险者公会/锻造公会/炼金商店/酒馆
  特殊地点:
    冰脉之心: 主矿脉深处的巨大冰脉矿簇，蕴藏着丰富的冰脉矿
    契约大厅: 人类贵族与矮人氏族长谈判并更新"冰峨契约"的石砌建筑
    深炉工坊: 矮人控制的锻造工坊，以生产冰霜附魔武器闻名
  任务层级: C级(最高)
  生命层级: 3(行政厅)/3(矮人长老会)/2(矿井)