---
霜临城:
  位置: 奥古斯提姆帝国-碧霜省中部
  规模: 大型城市
  人口构成: 人类70%|兽族15%|矮人10%(工匠)|翼民3%(宗教)|其他
  环境: 坐落于碧霜省中部的丘陵平原，地势平缓，交通网络发达，连接周边矿区与帝国各地。城市内矿业交易所、培训学院与人力资源机构林立，街道宽阔，奴隶市场人流如织，但无直接采矿设施
  概况: 帝国西北部矿业贸易、人力资源教育与调配的核心枢纽，负责矿产交易、矿工培训、劳动力调度，经济繁荣，基础设施完善
  资源:
    采集:
      史_金属(锻造公会)
      稀_炼金材料(炼金公会)
      史_魔物材料(来自周边山脉)
    制造:
      史_装备(锻造公会)
      稀_药剂(炼金公会)
      稀_魔导器械(交易所)
    交易:
      史_矿产/矿脉(矿市)
      奴隶(奴隶市场)
      稀_炼金材料(炼金公会)
    教育:
      稀_矿业/魔法技术(魔法学院)
      史_锻造(锻造公会)
  地点: 天霜矿市/奴隶市场/工匠区/炼金公会/冒险者公会/帝国银行/黑市/魔法学院/贸易区/行政厅
  特殊地点:
    霜临交易所: 宏伟的圆顶建筑，内部设有产权拍卖行、贸易合约登记处和募工中心
    行政厅: 帝国行政机构，也是省份人力调度中心
  任务层级: A级(最高)
  生命层级: 5(行政厅)/4(冒险者公会)/4(黑市)