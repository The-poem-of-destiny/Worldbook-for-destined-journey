---
银溪镇:
  位置: 奥古斯提姆帝国-霜脊省
  规模: 中型城镇
  人口构成: 人类95.9%|兽族2%(商品/奴隶)|精灵2%(旅客)|翼民(宗教)
  环境: 银白色河流穿城而过，沿岸豪宅林立，镇外森林因金属污染呈现诡异银灰色
  概况: 帝国奢侈品制造中心，贵族云集，治安严密
  资源:
    采集:
      优_炼金材料(森林)
      稀_金属(矿区)
    制造:
      稀_装备(锻造行会)
      优_药剂(商铺)
      史_饰品(银匠区)
    教育:
      稀_魔法/炼金术(书店/魔法塔)
  地点: 银匠区/锻造行会/冒险者公会
  特殊地点:
    锻造行会: 宏伟的穹顶建筑，内部陈列历代大师作品
  任务层级: C级(最高)
  生命层级: 4(城主府)/3(冒险者公会)/4(锻造行会)