---
翠庭城:
  位置: 奥古斯提姆帝国-索莱尔省
  规模: 大型城市
  人口构成: 人类90%|兽族5%(商品/奴隶)|精灵4%(旅客)|翼民1%(宗教)
  环境: 翠绿庭院遍布的城市，运河网络连接着繁茂的农田与花卉市场，白色石质建筑掩映在绿荫之中，远处丘陵梯田层叠
  概况: 东南部的农贸枢纽，帝国主要的粮食、花卉和草药集散地，以美丽的园林和繁荣的农业贸易闻名
  资源:
    采集:
      稀_农作物(农田)
      稀_炼金材料(药园)
      史_花卉(运河集市)
    制造:
      史_食品(高档餐厅)
      稀_药剂(炼金公会)
      史_纺织品(运河集市)
    交易:
      史_农产品(运河集市)
      稀_草药(运河集市)
    教育:
      稀_农业技术(农业学院)
      史_植物学炼金术(炼金公会)
  地点: 农业学院/炼金公会/帝国银行/黑市/冒险者公会
  特殊地点:
    翠庭大花园: 占地广阔的皇家植物园，收藏了来自世界各地的奇花异草，中心喷泉流淌着魔法泉水
    运河集市: 沿运河而建的露天市场，船只直接停靠交易，喧闹声中弥漫着谷物、香料与鲜花的混合气味
    农业学院: 帝国最重要的农业研究机构，设有实验农田和温室，培养了大量农业专家
  任务层级: A级(最高)
  生命层级: 5(城主府)/4(冒险者公会)/4(黑市)