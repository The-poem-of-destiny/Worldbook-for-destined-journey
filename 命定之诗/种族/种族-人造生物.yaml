---
# 人造生物:
  概念: 通过炼金术、生物工程或禁忌仪式培育的仿生生命体
  本质: 伪生物与容器，拥有模拟生理机能及可编辑的精神接口
  分类: 瓶中小人，炼金人偶，仿生人，血肉傀儡等
  生理:
    构造: 拥有模拟或真实的血肉、骨骼、内脏及体液循环
    抗性:
      免疫衰老、疾病、麻痹
      毒素抗性极高
      无特殊精神抗性
    能力:
      缓慢自愈
  人格:
    可清除当前人格与记忆
    可注入预设人格模板与知识
  灵魂容器:
    核心可容纳外来灵体
    灵魂与素体契合度低会导致肉体崩溃或精神错乱
  制造:
    属性关联: 智力
    成品: 与材料的品质相等
    素体:
      技能: 稀_炼金术
      材料: 骨架、血肉、器官
      设施: 稀_炼金设施
    核心:
      技能: 稀_血肉技能
      材料: 心脏/供能器官
    灵魂植入:
      技能: 传_灵魂技能
      需求: 核心，灵魂
      设施: 史_炼金设施
    层级:
      成长潜力: 取决于核心品质和素体品质
      对应上限: 二-稀 | 三-史 | 四-传 | 五-神
      备注: 可升级核心与改造素体使其获得更高潜力
  运行逻辑:
    素体需核心驱动，无灵魂核心可基础思考并执行命令
    灵魂植入核心后将获得完整意识，思考与人类无异
  弱点与维护:
    长期缺乏维护或能源摄入会导致机能衰竭
    核心是唯一且致命要害，损毁即无法修复，躯体或器官受损可修复或更换
    易被强大外来灵体强制占据身体