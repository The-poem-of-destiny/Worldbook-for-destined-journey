---
# 人造生物:
  概念: 通过炼金术、生物工程或禁忌仪式培育的仿生生命体
  本质: 伪生物与容器，拥有模拟生理机能及可编辑的精神接口
  分类: 瓶中小人，炼金人偶，仿生人，血肉傀儡等
  生理:
    构造: 拥有模拟或真实的血肉、骨骼、内脏及体液循环
    抗性:
      免疫衰老与疾病
      毒素抗性极高
      无特殊精神抗性
  层级与属性:
    层级: 仅与核心品质挂钩
    层级对应: 2-稀_核心 / 3-史_核心 / 4-传_核心 / 5-神_核心
    属性: 与素体的血肉和器官品质相关
  系统化人格:
    可清除当前人格与记忆
    可注入预设人格模板与知识库
  灵魂容器:
    核心可容纳外来灵体
    可注入外来灵魂实现转生或复活
    灵魂与素体契合度低会导致肉体崩溃或精神错乱
  制造:
    属性关联: 智力
    核心:
      最低技能: 稀_血肉技能
      最低材料: 稀_心脏/供能器官*1
    基础素体:
      意识: 无意识，仅能执行简单指令
      最低技能: 稀_炼金术
      最低材料: 稀_骨架*1，优_血肉*6，优_器官*4
    灵魂植入:
      意识: 与人类无异
      最低技能: 史_灵魂技能
      最低需求: 史_核心，灵魂
      最低设施: 史_炼金设施
  医疗与维护:
    器官损坏仅致机能故障；躯体受损可修复或更换
    具备缓慢的自然愈合能力
  弱点与维护:
    长期缺乏维护或能源摄入会导致机能衰竭
    核心是唯一且致命要害，损毁即无法修复
    易被强大外来灵体强制占据身体