---
# 人造生物:
  概念: 通过炼金术、生物工程或禁忌仪式培育的仿生生命体，无机械结构
  本质: 伪生物与容器，具有生理机能及可编辑的灵魂
  分类: 瓶中小人、仿生人、炼金人偶、血肉傀儡等
  生理:
    构造: 模拟或真实的血肉、骨骼、内脏及体液循环
    抗性:
      免疫衰老、疾病、麻痹
      毒素抗性极高
      无特殊精神抗性
    能力: 缓慢自愈
  人格:
    可清除当前人格与记忆
    可注入预设人格模板与知识
  灵魂容器:
    核心可容纳外来灵体
    灵魂与素体契合度低会导致肉体崩溃或精神错乱
  制造:
    属性关联: 智力
    成品: 与材料品质相等
    素体:
      技能: 稀_炼金术
      材料: 骨架、血肉、器官
      设施: 稀_炼金设施
    核心:
      技能: 稀_血肉技能
      材料: 心脏/供能器官
    灵魂植入:
      技能: 传_灵魂技能
      需求: 核心、灵魂
      设施: 史_炼金设施
    灵魂融合:
      技能: 无
      需求: 自愿灵魂
  运行逻辑:
    供能: 核心/心脏
    运行模式:
      心智模拟: 
        概念: 核心自行模拟，能言语并理解命令
        心智能力: 稀=动物 | 史=孩童 | 传=常人 | 神=天才
      灵魂植入: 捕捉灵魂植入核心，心智与常人无异
      灵魂融合: 灵魂或灵体自愿融合，心智与灵魂本体一致
    层级:
      成长潜力: 取决于核心与素体品质
      对应上限: 稀=层2 | 史=层3 | 传=层4 | 神=层5
      备注: 可升级核心或改造素体以获得更高潜力
    等级: 与灵魂本体一致，受潜力限制；若无灵魂默认为第一层级，需培养
  弱点与维护:
    缺乏维护会导致机能衰竭
    核心是唯一且致命要害，损毁即无法修复
    素体受损可修复或更换
    易被强大外来灵体强制占据身体
  特殊规则: 必须包含[核心]与[素体]两个装备，品质最低为稀有